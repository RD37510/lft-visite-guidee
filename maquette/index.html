<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La French Touch — Maquette 3D</title>
<script type="module" src="model-viewer.min.js"></script>
<style>
  :root { --or:#f5a623; --nv:#0f1b3d; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:system-ui,Segoe UI,Arial,sans-serif; background:#0d0f14; color:#fff; }
  header { display:flex; align-items:center; gap:14px; padding:12px 18px; background:#12151d; border-bottom:1px solid #232733; }
  header b { font-size:16px; letter-spacing:.5px; }
  header .sub { color:#8a90a0; font-size:12px; }
  .tabs { margin-left:auto; display:flex; gap:8px; }
  .tabs button { cursor:pointer; border:1px solid #2c3242; background:#1a1e29; color:#cfd4e0; padding:8px 16px; border-radius:9px; font-weight:600; font-size:13px; }
  .tabs button.active { background:var(--or); color:#1a1204; border-color:var(--or); }
  model-viewer { width:100%; height:calc(100vh - 58px); background:radial-gradient(circle at 50% 40%, #1a2033, #0b0d12); --poster-color:transparent; }
  .hint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:#000a; padding:7px 14px; border-radius:20px; font-size:12px; color:#c7ccd8; }
  .load { position:absolute; inset:0; display:grid; place-items:center; color:#8a90a0; font-size:14px; pointer-events:none; }
</style>
</head>
<body>
<header>
  <b>La French Touch</b><span class="sub">Maquette 3D — poulet braisé · Maspalomas</span>
  <div class="tabs">
    <button data-src="BR1.glb" class="active">Branding 1</button>
    <button data-src="BR2.glb">Branding 2</button>
    <button data-src="BR3.glb">Branding 3</button>
  </div>
</header>

<model-viewer id="mv" src="BR1.glb" camera-controls touch-action="pan-y"
  interaction-prompt="auto" auto-rotate auto-rotate-delay="1200" rotation-per-second="18deg"
  shadow-intensity="0.9" exposure="1.05" environment-image="neutral"
  camera-orbit="35deg 72deg 14m" field-of-view="42deg" min-camera-orbit="auto auto 4m" max-camera-orbit="auto auto 26m">
  <div class="load" slot="poster">Chargement de la maquette 3D…</div>
</model-viewer>

<div class="hint">Glisse pour tourner · molette pour zoomer · clic droit pour déplacer</div>

<script>
  const mv = document.getElementById('mv');
  document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mv.src = b.dataset.src;
  }));
</script>
</body>
</html>
